<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta name="description" content="Sorteio inteligente e balanceado de times de futebol" />
  <meta name="theme-color" content="#07101e" />

  <title>Racha Fácil ⚽</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Racha Fácil" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/assets/icons/icon.svg" />
  <link rel="apple-touch-icon" href="/assets/icons/icon.svg" />

  <!-- Open Graph (WhatsApp, Telegram, etc.) -->
  <!-- Atualize og:url com a URL real do seu deploy -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Racha Fácil ⚽" />
  <meta property="og:description" content="Sorteio inteligente e balanceado de times de futebol. Cadastre os jogadores, defina o nível e sorteie times equilibrados em segundos." />
  <meta property="og:image" content="https://racha-times.netlify.app/assets/icons/og-image.svg" />
  <meta property="og:url" content="https://racha-times.netlify.app" />
  <meta property="og:locale" content="pt_BR" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Racha Fácil ⚽" />
  <meta name="twitter:description" content="Sorteio inteligente e balanceado de times de futebol." />
  <meta name="twitter:image" content="/assets/icons/og-image.svg" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Styles -->
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <!-- Background ambient mesh -->
  <div class="bg-mesh" aria-hidden="true"></div>

  <!-- App root -->
  <div id="app"></div>

  <!-- Entry point (ES module) -->
  <script type="module" src="src/app.js"></script>

  <!-- Service Worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
